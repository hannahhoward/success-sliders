<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <!-- CSP backstop: even if an escaping bug slips through, injected script can't
       run and data can't leave for anywhere but Firestore. -->
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; script-src 'self' https://www.gstatic.com; connect-src 'self' https://firestore.googleapis.com; style-src 'self'; img-src 'self' data:; base-uri 'none'; form-action 'none'" />
  <title>Success Sliders</title>
  <meta name="description" content="Run a project success sliders exercise: set trade-off priorities, share a link, compare answers. Responses are end-to-end encrypted." />
  <meta name="theme-color" media="(prefers-color-scheme: light)" content="#f9f9f7" />
  <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#0d0d0d" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='4' y='9' width='24' height='2.5' rx='1.25' fill='%23898781'/%3E%3Ccircle cx='21' cy='10.25' r='4' fill='%232a78d6'/%3E%3Crect x='4' y='21' width='24' height='2.5' rx='1.25' fill='%23898781'/%3E%3Ccircle cx='11' cy='22.25' r='4' fill='%232a78d6'/%3E%3C/svg%3E" />
  <link rel="stylesheet" href="./styles.css" />
</head>
<body>
  <header class="site-header">
    <a class="brand" href="#/">
      <svg width="20" height="20" viewBox="0 0 32 32" aria-hidden="true"><rect x="4" y="9" width="24" height="2.5" rx="1.25" fill="currentColor" opacity="0.45"/><circle cx="21" cy="10.25" r="4" fill="var(--accent)"/><rect x="4" y="21" width="24" height="2.5" rx="1.25" fill="currentColor" opacity="0.45"/><circle cx="11" cy="22.25" r="4" fill="var(--accent)"/></svg>
      Success Sliders
    </a>
  </header>

  <main id="app">
    <div class="card empty-state"><p class="muted">Loading&hellip;</p></div>
  </main>

  <footer class="site-footer">
    <p class="muted small">
      Responses are end-to-end encrypted &mdash; only the results link can read them.
      <a href="https://github.com/hannahhoward/success-sliders">Source</a>
    </p>
  </footer>

  <script type="module" src="./js/app.js"></script>
</body>
</html>
